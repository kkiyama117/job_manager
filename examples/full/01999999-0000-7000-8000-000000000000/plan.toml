# examples/full/<uuid>/plan.toml — ExperimentPlan.
#
# Schema: job_manager::plan::ExperimentPlan (deny_unknown_fields)
#   jobs.<JobId> : BTreeMap<String, toml::Value>  (arbitrary TOML values)
#
# Demonstrates every TOML value kind so you can see the flexibility.
# Every JobId in flow.toml has an entry here (jm doctor WARNs otherwise).
#
# Inline markers: # <required> = serde-mandatory, # <optional> = omittable.
# ExperimentPlan mandates NO specific keys — every per-job key is an
# arbitrary user render param, so all are # <optional> (a flow job with
# no plan entry is a `jm doctor` WARN, not a hard error).

[jobs.opt]                           # <optional> section (per-job render params)
note      = "string value"           # <optional>
nproc     = 8                        # <optional> integer
threshold = 1.5e-4                   # <optional> float
verbose   = true                     # <optional> boolean
route     = ["opt", "freq=noraman"]  # <optional> array
[jobs.opt.solvent]                   # <optional> nested table value
model = "pcm"                        # <optional>
name  = "water"                      # <optional>

[jobs.freq]                          # <optional> section (per-job render params)
note  = "second step"                # <optional>
nproc = 8                            # <optional>
