# examples/full/<uuid>/flow.toml — EXHAUSTIVE, VALID JobFlow.
#
# Schema: gaussian_job_shared::entities::workflow::JobFlow
#   uuid          UUID v7 — MUST equal the parent directory name
#   created_at    RFC3339 UTC
#   tags          optional BTreeMap<String,String>
#   jobs.<JobId>  Job = JobSpec{program,config,body} (flattened) + parents[]
#
# Two jobs: `opt` (root) -> `freq` (afterok opt). `opt.config` shows every
# SlurmJobConfig field. partition is set explicitly so this file is valid
# standalone (a real flow.toml may omit it and inherit from common.toml).
#
# Inline markers: # <required> = serde-mandatory, # <optional> = omittable.

uuid       = "01999999-0000-7000-8000-000000000000"  # <required> must equal parent dir name
created_at = "2026-05-15T00:00:00Z"                   # <required> RFC3339 UTC

[tags]                                  # <optional> section (free-form metadata)
example = "full"                        # <optional>
owner   = "demo"                        # <optional>

# --- root job: every SlurmJobConfig field set ---
[jobs.opt]                              # <optional> section (jobs map; a job table)
program = "echo"                        # <required>
body    = "echo \"[opt] flow=$JM_FLOW_UUID job=$JM_JOB_ID\"\nsleep 1\n"  # <required>

[jobs.opt.config]                     # <optional> section (omittable if common.toml supplies partition)
partition     = "long"                # <required> (inheritable from common.toml)
time_limit    = "01:00:00"            # <optional>
job_name      = "jm-full-opt"         # <optional>
comment       = "optimization step"   # <optional>
log_stdout    = "/work/jm-full/opt.%j.out"   # <optional>
log_stderr    = "/work/jm-full/opt.%j.err"   # <optional>
mail_user     = "user@example.com"    # <optional>
mail_types    = ["END", "FAIL"]        # <optional> array of: BEGIN, END, FAIL, REQUEUE, ALL
resource_spec = "p=1:t=8:c=8:m=8G"   # <optional> CPU form "p=N:t=N:c=N:m=NG" OR GPU form "g=N" — one string, mutually exclusive
array_spec    = "0-1"                  # <optional>
# dependency  = "afterok:12345"      # <optional> job-manager manages deps via parents[]; manual override only

# --- child job: depends on opt finishing exit 0 ---
[jobs.freq]                             # <optional> section (jobs map; a job table)
program = "echo"                        # <required>
body    = "echo \"[freq] flow=$JM_FLOW_UUID job=$JM_JOB_ID\"\nsleep 1\n"  # <required>

[jobs.freq.config]                      # <optional> section (omittable if common.toml supplies partition)
partition  = "long"                     # <required> (inheritable from common.toml)
time_limit = "00:30:00"                 # <optional>

# JobEdge.kind in { afterok, afterany, after, afternotok, aftercorr,
#                   afterburstbuffer, singleton }. afterok is the common one.
[[jobs.freq.parents]]                   # <optional> array (empty/absent = root job)
from = "opt"                            # <required>
kind = "afterok"                        # <required>
