# JobFlow — sweep + fan-out DAG (failure variant).
#
# Shape (7 nodes, 6 afterok edges):
#
#                              prep
#                  ┌─────────────┼─────────────┐
#                  ▼             ▼             ▼
#        opt__compound=0  opt__compound=1  opt__compound=2
#                  │             │             │
#                  ▼             ▼             ▼
#        freq__compound=0 freq__compound=1 freq__compound=2
#
# Sweep axis: `compound ∈ {0=benzene, 1=toluene, 2=p-xylene}`.
# JobIds with `=` (build_job_id output) must be quoted in TOML table headers.
#
# `body` reads two render-time params surfaced as env exports by
# `render_batch_bash`: `JM_PARAM_COMPOUND_NAME` and `JM_PARAM_ROUTE`.
# Values come from the sibling plan.toml (`[jobs.<JobId>].compound_name`,
# `[jobs.<JobId>].route`). `prep` has compound_name = "" so its line
# renders as `compound=` — that's intentional, to show the export is
# always defined.
#
# `partition` は flow.toml には書かず、`common.toml [slurm_default]` から
# `read_flow` 段で TOML preparse 経由で自動 inject される (F2 partition
# defaulting; cf. examples/simple)。個別ジョブで上書きしたい場合のみ
# `[jobs.X.config].partition = "..."` を明示する。実 partition への置換は
# 共通の `common.toml` 側だけで済む。
#
# Failure variant: `opt__compound=1` の `body` を `exit 1` に差し替えて
# Skipped propagation を `freq__compound=1` に伝播させる。他 2 枝
# (compound=0,2) は最後まで成功するので Skipped が culprit を保持する
# こと、afterok の局所性、が同時に観察できる。

uuid       = "0199999a-0000-7000-8000-000000000001"
created_at = "2026-05-15T00:00:00Z"

[tags]
example = "sweep"
variant = "failure"

# --- root step ---
[jobs.prep]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[jobs.prep.config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

# --- opt branches (3-way fan-out from prep) ---
[jobs."opt__compound=0"]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[[jobs."opt__compound=0".parents]]
from = "prep"
kind = "afterok"

[jobs."opt__compound=0".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

[jobs."opt__compound=1"]
program = "echo"
# Failure variant: this body intentionally `exit 1`s to demonstrate
# Skipped propagation into `freq__compound=1` (the other two branches
# still complete). Cluster-agnostic — no real workload needs to crash.
body    = "echo \"[$JM_JOB_ID] simulated failure: $JM_PARAM_COMPOUND_NAME\"\nexit 1\n"

[[jobs."opt__compound=1".parents]]
from = "prep"
kind = "afterok"

[jobs."opt__compound=1".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

[jobs."opt__compound=2"]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[[jobs."opt__compound=2".parents]]
from = "prep"
kind = "afterok"

[jobs."opt__compound=2".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

# --- freq branches (one linear afterok per opt) ---
[jobs."freq__compound=0"]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[[jobs."freq__compound=0".parents]]
from = "opt__compound=0"
kind = "afterok"

[jobs."freq__compound=0".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

[jobs."freq__compound=1"]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[[jobs."freq__compound=1".parents]]
from = "opt__compound=1"
kind = "afterok"

[jobs."freq__compound=1".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。

[jobs."freq__compound=2"]
program = "echo"
body    = "echo \"[$JM_JOB_ID] flow=$JM_FLOW_UUID compound=$JM_PARAM_COMPOUND_NAME route=$JM_PARAM_ROUTE\"\nsleep 2\n"

[[jobs."freq__compound=2".parents]]
from = "opt__compound=2"
kind = "afterok"

[jobs."freq__compound=2".config]
# partition は common.toml の [slurm_default] から自動で補完される。
# 個別に上書きしたい場合のみここで partition = "..." を指定。
