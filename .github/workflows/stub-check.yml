# Verify that pyo3-stub-gen output committed to the repo is up to date.
#
# Scope: runs ONLY on pushes to the `main` branch and on tag pushes
# (typically releases). PR validation is intentionally not wired here —
# stub freshness on feature branches is enforced by the local
# pre-commit hook (.pre-commit-config.yaml → pyo3-stub-gen).
#
# Failure mode: if regenerated .pyi differs from the committed tree, the
# `git diff --exit-code` step fails and prints the drift, blocking the
# release/merge until the contributor regenerates locally and commits.
#
# Upstream crates (gaussian_job_shared, slurm_async_runner) are pulled
# directly from GitHub via `git = "..."` in Cargo.toml, so this workflow
# only needs to check out this repository.
name: stub-check

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        # rust-toolchain.toml selects nightly; this action respects it.
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Match the ruff version pinned in .pre-commit-config.yaml so the
      # post-stub_gen formatting below produces byte-identical output to
      # what contributors commit via pre-commit. Bump in lockstep with the
      # `ruff-pre-commit` rev there.
      - name: Install ruff (matches .pre-commit-config.yaml rev)
        run: python -m pip install --quiet ruff==0.15.12

      - name: Regenerate pyo3-stub-gen output
        run: cargo run --quiet --bin stub_gen

      # stub_gen emits single-line signatures and an extra trailing blank
      # line; the committed .pyi files are then re-wrapped by `ruff format`
      # via the pre-commit hook. Mirror that step here so the diff check
      # below sees only true drift, not formatter divergence.
      - name: Format regenerated stubs (matches pre-commit ruff-format)
        run: ruff format python

      - name: Verify .pyi files are committed and unchanged
        run: |
          if ! git diff --exit-code -- 'python/**/*.pyi'; then
            echo "::error::pyo3-stub-gen output is stale. Run \`cargo run --bin stub_gen\` locally and commit the regenerated .pyi files." >&2
            exit 1
          fi
